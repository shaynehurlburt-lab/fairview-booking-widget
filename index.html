<!DOCTYPE html>
<html>
<head>
<title>Fairview Booking Prototype</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>

body{
font-family:Arial;
background:#f5f5f5;
margin:0;
padding:40px;
}

.container{
max-width:900px;
margin:auto;
background:white;
padding:30px;
border-radius:12px;
}

button{
padding:14px;
margin:6px;
border-radius:8px;
border:1px solid #ddd;
cursor:pointer;
font-size:16px;
}

button:hover{
background:#f1f1f1;
}

.step{
margin-top:30px;
}

.hidden{
display:none;
}

</style>
</head>

<body>

<div class="container">

<h2>Fairview Limousine Shuttles</h2>
<p>Select date of travel</p>

<input type="date" id="date">

<h3>Guests</h3>

Adults <input type="number" value="2"><br>
Kids <input type="number" value="0"><br>
Infants <input type="number" value="0"><br>
Pets <input type="number" value="0"><br>

<div class="step">

<h3>Choose Shuttle</h3>

<button onclick="choose('sunrise')">Moraine Lake Sunrise</button>
<button onclick="choose('moraine')">Moraine Lake Only</button>
<button onclick="choose('louise')">Lake Louise Only</button>
<button onclick="choose('both')">Both Lakes One Day</button>

</div>

<div id="times" class="step hidden">

<h3>Select Departure Time</h3>

<div id="timeButtons"></div>

</div>

</div>

<script>

const moraineTimes=[
"6:30 AM",
"7:45 AM",
"9:00 AM",
"10:15 AM",
"11:30 AM",
"12:45 PM",
"2:00 PM",
"3:15 PM",
"4:30 PM"
];

function choose(type){

let container=document.getElementById("timeButtons");

container.innerHTML="";

moraineTimes.forEach(t=>{

let b=document.createElement("button");
b.innerText=t;

container.appendChild(b);

});

document.getElementById("times").classList.remove("hidden");

}

</script>

</body>
</html>
